name: Generate Daily Wallpaper

on:
  schedule:
    - cron: '0 7 * * *'   # 7 AM UTC = ~3 AM ET; image ready when you wake up
  workflow_dispatch:       # manual trigger for testing

permissions:
  contents: write          # needed to commit the image back to the repo

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate wallpaper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate.py

      - name: Commit and push
        run: |
          git config user.name  "Wallpaper Bot"
          git config user.email "wallpaper-bot@users.noreply.github.com"
          git add wallpaper/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "wallpaper: $(date -u +%Y-%m-%d)"
          git push
